<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企鵝機器人 - Web 管理控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 側邊欄樣式 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(15, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            margin: 5px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ccc;
        }

        .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .nav-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        /* 主內容區 */
        .main-content {
            margin-left: 280px;
            padding: 20px 30px;
            min-height: 100vh;
        }

        /* 頂部導航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
        }

        /* 卡片與元件 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-value { font-size: 1.8rem; font-weight: bold; margin: 5px 0; }

        .settings-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* 開關切換按鈕 */
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #444;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active { background: #667eea; }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .toggle-switch.active .toggle-slider { left: 27px; }

        /* 按鈕與表格 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* 標籤頁切換 */
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .tab { padding: 8px 16px; cursor: pointer; border-radius: 8px; }
        .tab.active { background: rgba(102,126,234,0.2); color: #667eea; border: 1px solid #667eea; }

        /* 通知 Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* 手機版優化 */
        .mobile-menu-btn { display: none; position: fixed; top: 15px; left: 15px; z-index: 200; font-size: 24px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>🐧 企鵝機器人</h2>
            <p style="color: #aaa; font-size: 0.8rem;">管理面板 v1.0</p>
        </div>
        <div class="nav-item active" data-page="dashboard">📊 儀表板</div>
        <div class="nav-item" data-page="servers">🌐 伺服器管理</div>
        <div class="nav-item" data-page="blacklist">🔒 黑名單管理</div>
        <div class="nav-item" data-page="defense">🛡️ 防禦系統</div>
        <div class="nav-item" data-page="announce">📢 公告系統</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 id="pageTitle">儀表板</h1>
            <div style="color: #2ecc71;">● 機器人在線</div>
        </div>

        <div id="dashboardPage" class="page-content">
            <div class="stats-grid">
                <div class="stat-card"><div>伺服器數量</div><div class="stat-value">1,284</div></div>
                <div class="stat-card"><div>總成員數</div><div class="stat-value">452,093</div></div>
                <div class="stat-card"><div>黑名單記錄</div><div class="stat-value">892</div></div>
            </div>
            <div class="settings-section">
                <h3>系統概況</h3>
                <div class="setting-row"><span>防 Nuke 系統</span><span style="color: #2ecc71;">運行中</span></div>
                <div class="setting-row"><span>API 延遲</span><span>42ms</span></div>
            </div>
        </div>

        <div id="serversPage" class="page-content" style="display:none">
            <div class="settings-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('server-list')">伺服器列表</div>
                </div>
                <div id="server-list-content" class="tab-content active">
                    <table class="data-table">
                        <thead><tr><th>伺服器名稱</th><th>ID</th><th>成員數</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr><td>企鵝測試服</td><td>123456789</td><td>520</td><td><button class="btn btn-danger">退出</button></td></tr>
                            <tr><td>官方支援群</td><td>987654321</td><td>1,200</td><td><button class="btn btn-danger">退出</button></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="blacklistPage" class="page-content" style="display:none">
            <div class="settings-section">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('bl-list')">黑名單列表</div>
                    <div class="tab" onclick="switchTab('bl-add')">新增紀錄</div>
                </div>
                <div id="bl-list-content" class="tab-content active">
                    <table class="data-table">
                        <thead><tr><th>用戶 ID</th><th>原因</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr><td>1029384756</td><td>惡意刷頻</td><td><button class="btn btn-danger">移除</button></td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="bl-add-content" class="tab-content">
                    <input type="text" placeholder="輸入用戶 ID" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #444; color:white;">
                    <button class="btn btn-primary" onclick="showToast('已成功加入黑名單')">提交新增</button>
                </div>
            </div>
        </div>

        <div id="defensePage" class="page-content" style="display:none">
            <div class="settings-section">
                <div class="setting-row">
                    <div><h4>防 Nuke 模式</h4><p style="font-size:0.8rem; color:#aaa;">自動攔截大量頻道刪除行為</p></div>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active'); showToast('設定已更新')"><div class="toggle-slider"></div></div>
                </div>
                <div class="setting-row">
                    <div><h4>防 Raid 模式</h4><p style="font-size:0.8rem; color:#aaa;">偵測短時間內大量帳號加入</p></div>
                    <div class="toggle-switch" onclick="this.classList.toggle('active'); showToast('設定已更新')"><div class="toggle-slider"></div></div>
                </div>
            </div>
        </div>

        <div id="announcePage" class="page-content" style="display:none">
            <div class="settings-section">
                <h3>發送全域公告</h3>
                <textarea rows="5" placeholder="輸入公告內容..." style="width:100%; padding:10px; margin-top:15px; background:#222; border:1px solid #444; color:white;"></textarea>
                <button class="btn btn-primary" style="margin-top:15px;" onclick="showToast('公告已發送至所有伺服器')">立即發送</button>
            </div>
        </div>
    </div>

    <script>
        // 頁面切換邏輯
        const navItems = document.querySelectorAll('.nav-item');
        const pageContents = document.querySelectorAll('.page-content');
        const pageTitle = document.getElementById('pageTitle');
        const sidebar = document.getElementById('sidebar');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                // 更新導航 UI
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                // 切換分頁內容
                const targetPage = item.getAttribute('data-page');
                pageContents.forEach(p => p.style.display = 'none');
                document.getElementById(targetPage + 'Page').style.display = 'block';
                
                // 更新標題
                pageTitle.innerText = item.innerText.replace(/[^\u4e00-\u9fa5]/g, '');

                // 手機版自動收起
                if (window.innerWidth <= 768) sidebar.classList.remove('open');
            });
        });

        // 標籤頁 (Tab) 切換邏輯
        function switchTab(tabId) {
            const tabElements = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');
            
            // 找出點擊的 Tab 所屬的容器
            tabElements.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(tabId + '-content').classList.add('active');
        }

        // 手機版選單
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // 通知視窗
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 2500);
        }
    </script>
</body>
</html>
